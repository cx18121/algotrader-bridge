services:
  # -------------------------------------------------------
  # IB Gateway (headless — login via browser at :6080)
  # First boot: open http://YOUR_SERVER_IP:6080, log in to IBKR.
  # -------------------------------------------------------
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: unless-stopped
    environment:
      - TWS_USERID=${IB_USERNAME}
      - TWS_PASSWORD=${IB_PASSWORD}
      - TRADING_MODE=${TRADING_MODE:-paper}      # paper or live
      - TWS_ACCEPT_INCOMING=accept
      - TRUSTED_IPS=127.0.0.1,172.0.0.0/8
      - GATEWAY_OR_TWS=gateway
      - READ_ONLY_API=no
      - VNC_SERVER_PASSWORD=${VNC_PASSWORD:-changeme}
      - EXISTING_SESSION_DETECTED_ACTION=primary
      - AUTO_RESTART_TIME=00:15
      - RELOGIN_AFTER_TWOFA_TIMEOUT=yes
      - TWOFA_TIMEOUT_ACTION=restart
    # IBKR API ports stay internal on the Docker network; the bridge connects
    # to ib-gateway:4002/4001 by service name.
    # Exposing these to the public VPS interface is unnecessary and risky.
    healthcheck:
      # 0FA2 = 4002 (paper). Change to 0FA1 for live trading.
      test: ["CMD-SHELL", "cat /proc/net/tcp* | grep -qE '0FA2|0FA1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ib_gateway_jts:/home/ibgateway/Jts/ibgateway

  # -------------------------------------------------------
  # AlgoTrader Bridge (webhook → order router → IB Gateway)
  # Connects to IB Gateway over the Docker service network. This keeps bridge
  # reconnect behavior independent from Gateway container restarts.
  # -------------------------------------------------------
  bridge:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TWS_HOST=ib-gateway
      - TWS_PORT=${TWS_PORT:-4002}               # 4002=paper, 4001=live
      - DB_PATH=/app/data/trading.db
    volumes:
      - trading_data:/app/data
    depends_on:
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------
  # Nginx reverse proxy — exposes dashboard on port 80/443
  # and blocks direct access to the raw bridge port.
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      bridge:
        condition: service_healthy

  # -------------------------------------------------------
  # noVNC — web UI to visually verify IB Gateway login
  # Open http://YOUR_SERVER_IP:6080 in a browser.
  # -------------------------------------------------------
  novnc:
    image: alpine
    command: >
      sh -c "apk add --no-cache novnc websockify &&
             websockify --web=/usr/share/novnc 6080 ib-gateway:5900"
    ports:
      - "6080:6080"
    depends_on:
      - ib-gateway
    restart: unless-stopped

volumes:
  trading_data:
  ib_gateway_jts:
